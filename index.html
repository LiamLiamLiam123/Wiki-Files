<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WIKI-FILES</title>
<style>
  :root{
    --bg:#0a0a0f;
    --panel:#15151f;
    --line:#2a2a38;
    --ink:#e8e8f0;
    --dim:#8888a0;
    --accent:#6ee7b7;
    --folder:#f4c860;
    --file:#7eb6ff;
    --mono:'Consolas','SF Mono','Courier New',monospace;
    --sans:'Segoe UI',Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  header{
    padding:.7em 1em;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:.6em;
    background:var(--panel);
  }
  header .title{
    font-family:var(--mono);
    font-weight:700;
    letter-spacing:.08em;
    color:var(--accent);
    font-size:.95em;
  }
  header .title span{ color:var(--dim); }

  .pathbar{
    flex:1;
    display:flex;
    align-items:center;
    gap:.3em;
    overflow-x:auto;
    font-family:var(--mono);
    font-size:.85em;
    white-space:nowrap;
    padding:.3em .6em;
    background:#0e0e16;
    border:1px solid var(--line);
    border-radius:4px;
  }
  .pathbar .crumb{
    color:var(--dim);
    cursor:pointer;
    padding:.1em .3em;
    border-radius:3px;
  }
  .pathbar .crumb:hover{ color:var(--ink); background:var(--line); }
  .pathbar .crumb.current{ color:var(--accent); cursor:default; }
  .pathbar .sep{ color:#444; }

  header .backbtn{
    font-family:var(--mono);
    font-size:.85em;
    background:var(--line);
    color:var(--ink);
    border:none;
    border-radius:4px;
    padding:.4em .7em;
    cursor:pointer;
  }
  header .backbtn:hover{ background:#3a3a4e; }
  header .backbtn:disabled{ opacity:.3; cursor:default; }

  .searchbox{
    position:relative;
    width:200px;
  }
  .searchbox input{
    width:100%;
    font-family:var(--mono);
    font-size:.85em;
    background:#0e0e16;
    border:1px solid var(--line);
    color:var(--ink);
    border-radius:4px;
    padding:.45em .6em;
    outline:none;
  }
  .searchbox input:focus{ border-color:var(--accent); }
  .suggestions{
    position:absolute;
    top:110%;
    left:0;
    right:0;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    max-height:240px;
    overflow-y:auto;
    z-index:10;
    display:none;
  }
  .suggestions.show{ display:block; }
  .suggestions .sug-item{
    padding:.5em .6em;
    font-family:var(--mono);
    font-size:.8em;
    cursor:pointer;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:.4em;
    border-bottom:1px solid var(--line);
  }
  .suggestions .sug-item:last-child{ border-bottom:none; }
  .suggestions .sug-item:hover{ background:var(--line); }
  .suggestions .sug-item .icon{ color:var(--folder); }

  main{
    flex:1;
    overflow-y:auto;
    padding:1em;
  }

  .info-panel{
    max-width:700px;
    margin:0 auto 1em;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:1em 1.2em;
    font-size:.9em;
    color:var(--dim);
    line-height:1.5;
  }
  .info-panel h2{
    margin:0 0 .3em;
    color:var(--ink);
    font-size:1.1em;
    font-family:var(--mono);
  }
  .info-panel img{
    float:right;
    max-width:100px;
    border-radius:4px;
    margin-left:1em;
    border:1px solid var(--line);
  }
  .info-panel .clear{ clear:both; }

  .grid{
    max-width:700px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(110px,1fr));
    gap:.6em;
  }
  .item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.4em;
    padding:.7em .4em;
    border-radius:6px;
    cursor:pointer;
    text-align:center;
    border:1px solid transparent;
  }
  .item:hover{
    background:var(--panel);
    border-color:var(--line);
  }
  .item .icon{
    font-size:2.2em;
    line-height:1;
  }
  .item.folder .icon{ color:var(--folder); }
  .item .name{
    font-size:.78em;
    word-break:break-word;
    color:var(--ink);
    max-height:2.6em;
    overflow:hidden;
  }

  .loading, .error{
    max-width:700px;
    margin:2em auto;
    text-align:center;
    color:var(--dim);
    font-family:var(--mono);
    font-size:.9em;
  }
  .error{ color:#ff8a8a; }

  footer{
    padding:.5em 1em;
    text-align:center;
    font-family:var(--mono);
    font-size:.7em;
    color:#555;
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>

<header>
  <div class="title">WIKI<span>-FILES</span></div>
  <button class="backbtn" id="backBtn" onclick="goBack()" disabled>&larr; back</button>
  <div class="pathbar" id="pathbar"></div>
  <div class="searchbox">
    <input type="text" id="searchInput" placeholder="search wikipedia..." autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>
</header>

<main id="main"></main>

<footer>everything is a folder · everything is a file · powered by the Wikipedia API</footer>

<script>
const main = document.getElementById('main');
const pathbar = document.getElementById('pathbar');
const backBtn = document.getElementById('backBtn');

let history = [];
const ICONS_FOLDER = '📁';

// Root entry point — just one door in
const ROOT_TITLE = 'Universe';

function renderPath() {
  pathbar.innerHTML = '';
  const rootCrumb = document.createElement('span');
  rootCrumb.className = 'crumb' + (history.length === 0 ? ' current' : '');
  rootCrumb.textContent = 'root';
  rootCrumb.onclick = () => { if (history.length) { history = []; render(); } };
  pathbar.appendChild(rootCrumb);

  history.forEach((title, i) => {
    const sep = document.createElement('span');
    sep.className = 'sep';
    sep.textContent = '/';
    pathbar.appendChild(sep);

    const crumb = document.createElement('span');
    crumb.className = 'crumb' + (i === history.length - 1 ? ' current' : '');
    crumb.textContent = title.replace(/_/g, ' ');
    crumb.onclick = () => {
      if (i < history.length - 1) {
        history = history.slice(0, i + 1);
        render();
      }
    };
    pathbar.appendChild(crumb);
  });

  backBtn.disabled = history.length === 0;
}

function goBack() {
  if (history.length) {
    history.pop();
    render();
  }
}

async function fetchSummary(title) {
  const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(title));
  if (!res.ok) throw new Error('not found');
  return res.json();
}

async function fetchLinks(title) {
  const res = await fetch(
    'https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=links&pllimit=120&plnamespace=0&titles=' +
    encodeURIComponent(title)
  );
  const data = await res.json();
  const pages = data.query.pages;
  const pageId = Object.keys(pages)[0];
  const links = pages[pageId].links || [];
  return links.map(l => l.title);
}

function setLoading() {
  main.innerHTML = '<div class="loading">opening folder…</div>';
}

function setError(msg) {
  main.innerHTML = '<div class="error">' + msg + '<br><br>' +
    '<span style="cursor:pointer;text-decoration:underline" onclick="goBack()">go back</span></div>';
}

async function render() {
  renderPath();
  setLoading();

  const currentTitle = history.length ? history[history.length - 1] : null;

  try {
    let summary = null;
    let links = [];

    if (currentTitle) {
      [summary, links] = await Promise.all([
        fetchSummary(currentTitle),
        fetchLinks(currentTitle)
      ]);
    } else {
      // Root: show only the single entry point
      links = [ROOT_TITLE];
    }

    main.innerHTML = '';

    // Info panel
    const info = document.createElement('div');
    info.className = 'info-panel';
    if (summary) {
      let html = '<h2>' + summary.title + '</h2>';
      if (summary.thumbnail && summary.thumbnail.source) {
        html += '<img src="' + summary.thumbnail.source + '" alt="">';
      }
      html += '<div>' + (summary.extract || 'No description available.') + '</div><div class="clear"></div>';
      info.innerHTML = html;
    } else {
      info.innerHTML = '<h2>root /</h2><div>Every folder is a Wikipedia article. Every file inside it is a link that article contains — which is itself a folder. Keep opening things. There is no bottom.</div>';
    }
    main.appendChild(info);

    // De-duplicate, filter out current article
    const seen = new Set();
    const cleanLinks = links.filter(t => {
      if (currentTitle && t === currentTitle) return false;
      if (seen.has(t)) return false;
      seen.add(t);
      return true;
    });

    if (cleanLinks.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'loading';
      empty.textContent = '(empty — this article has no outgoing links)';
      main.appendChild(empty);
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'grid';

    cleanLinks.forEach(title => {
      const item = document.createElement('div');
      item.className = 'item folder';
      item.innerHTML =
        '<div class="icon">' + ICONS_FOLDER + '</div>' +
        '<div class="name">' + title.replace(/_/g, ' ') + '</div>';
      item.onclick = () => {
        history.push(title);
        render();
      };
      grid.appendChild(item);
    });

    main.appendChild(grid);

  } catch (err) {
    setError('Couldn\'t open "' + (currentTitle ? currentTitle.replace(/_/g, ' ') : 'root') + '" (' + err.message + ')');
  }
}

render();

// --- Search ---
const searchInput = document.getElementById('searchInput');
const suggestions = document.getElementById('suggestions');
let searchTimeout = null;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearTimeout(searchTimeout);
  if (!q) {
    suggestions.classList.remove('show');
    suggestions.innerHTML = '';
    return;
  }
  searchTimeout = setTimeout(() => doSearch(q), 250);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const first = suggestions.querySelector('.sug-item');
    if (first) first.click();
  }
  if (e.key === 'Escape') {
    suggestions.classList.remove('show');
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.searchbox')) {
    suggestions.classList.remove('show');
  }
});

async function doSearch(query) {
  try {
    const res = await fetch(
      'https://en.wikipedia.org/w/api.php?action=query&list=search&format=json&origin=*&srlimit=8&srsearch=' +
      encodeURIComponent(query)
    );
    const data = await res.json();
    const results = data.query.search || [];
    suggestions.innerHTML = '';
    if (results.length === 0) {
      suggestions.innerHTML = '<div class="sug-item" style="cursor:default;color:var(--dim)">no results</div>';
    } else {
      results.forEach(r => {
        const item = document.createElement('div');
        item.className = 'sug-item';
        item.innerHTML = '<span class="icon">📁</span><span>' + r.title + '</span>';
        item.onclick = () => {
          history.push(r.title);
          render();
          searchInput.value = '';
          suggestions.classList.remove('show');
        };
        suggestions.appendChild(item);
      });
    }
    suggestions.classList.add('show');
  } catch (err) {
    suggestions.innerHTML = '<div class="sug-item" style="cursor:default;color:#ff8a8a">search failed</div>';
    suggestions.classList.add('show');
  }
}
</script>

</body>
</html>
